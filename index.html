<!DOCTYPE html>
<html>
<head>
    <title>OptiCrop - Smart Crop Recommendation</title>
</head>

<body>

    <h1>🌱 OptiCrop</h1>
    <h2>Smart Crop Recommendation System</h2>

    <form action="/predict" method="POST">

        <label>Nitrogen (N):</label><br>
        <input type="number" name="N" required><br><br>

        <label>Phosphorus (P):</label><br>
        <input type="number" name="P" required><br><br>

        <label>Potassium (K):</label><br>
        <input type="number" name="K" required><br><br>

        <label>Temperature:</label><br>
        <input type="number" step="0.01" name="temperature" required><br><br>

        <label>Humidity:</label><br>
        <input type="number" step="0.01" name="humidity" required><br><br>

        <label>pH:</label><br>
        <input type="number" step="0.01" name="ph" required><br><br>

        <label>Rainfall:</label><br>
        <input type="number" step="0.01" name="rainfall" required><br><br>

        <button type="submit">Predict Crop</button>

    </form>

</body>
</html>
